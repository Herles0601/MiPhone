<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Phone HN | Celulares, iPads y Accesorios Apple</title>
  <style>
    body {font-family: Arial, sans-serif; margin:0; background:#fff; color:#050816;}
    header {text-align:center; padding:20px; background:#f3f4f6;}
    .product-grid {display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:20px;}
    .product-card {border:1px solid #e5e7eb; border-radius:16px; overflow:hidden; transition:0.2s;}
    .product-card:hover {transform:translateY(-5px);}
    .product-card img {width:100%; height:200px; object-fit:cover;}
    .product-info {padding:16px;}
    .product-info h3 {margin:0 0 8px 0; font-size:18px;}
    .product-price {color:#0057ff; font-weight:800; font-size:16px; margin-bottom:8px;}
    .product-status {display:inline-block; background:#e5efff; color:#0057ff; padding:4px 8px; border-radius:999px; font-size:12px; margin-bottom:8px;}
    .btn {display:inline-block; padding:8px 16px; border-radius:8px; background:#0057ff; color:#fff; font-weight:600; text-align:center; text-decoration:none;}
  </style>
</head>
<body>
  <header>
    <h1>Mi Phone HN</h1>
    <p>Celulares, iPads y Accesorios Apple - Choluteca</p>
  </header>

  <section id="productos">
    <h2 style="text-align:center; padding-top:20px;">Catálogo de productos</h2>
    <div id="productos-api" class="product-grid">
      <p>Cargando productos...</p>
    </div>
  </section>

  <script>
    const API_PRODUCTOS = "productos.json";

    const productosDemo = [
      {"nombre":"iPhone 11 64GB","precio":"L 6,900","estado":"Semiusado","categoria":"iPhone","imagen":"https://images.unsplash.com/photo-1574755393849-623942496936?auto=format&fit=crop&w=900&q=80"},
      {"nombre":"iPhone 12 128GB","precio":"L 9,500","estado":"Semiusado","categoria":"iPhone","imagen":"https://images.unsplash.com/photo-1603891128711-11b4b03bb138?auto=format&fit=crop&w=900&q=80"},
      {"nombre":"iPhone 13 Pro 128GB","precio":"L 15,900","estado":"Semiusado","categoria":"iPhone","imagen":"https://images.unsplash.com/photo-1632661674596-df8be070a5c5?auto=format&fit=crop&w=900&q=80"},
      {"nombre":"iPhone 14 Pro Max 256GB","precio":"L 23,900","estado":"Semiusado","categoria":"iPhone","imagen":"https://images.unsplash.com/photo-1663499482523-1c0c1bae4ce1?auto=format&fit=crop&w=900&q=80"},
      {"nombre":"Samsung Galaxy S21","precio":"L 8,900","estado":"Semiusado","categoria":"Samsung","imagen":"https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?auto=format&fit=crop&w=900&q=80"},
      {"nombre":"Samsung Galaxy S23 Ultra","precio":"L 18,500","estado":"Semiusado","categoria":"Samsung","imagen":"https://images.unsplash.com/photo-1678911820864-e2c567c655d7?auto=format&fit=crop&w=900&q=80"},
      {"nombre":"iPad 9na Generación 64GB","precio":"L 8,900","estado":"Nuevo","categoria":"iPad","imagen":"https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?auto=format&fit=crop&w=900&q=80"},
      {"nombre":"AirPods Pro","precio":"L 3,200","estado":"Nuevo","categoria":"Accesorios Apple","imagen":"https://images.unsplash.com/photo-1603351154351-5e2d0600bb77?auto=format&fit=crop&w=900&q=80"},
      {"nombre":"Cargador Apple 20W","precio":"L 650","estado":"Nuevo","categoria":"Accesorios Apple","imagen":"https://images.unsplash.com/photo-1583863788434-e58a36330cf0?auto=format&fit=crop&w=900&q=80"}
    ];

    function mostrarProductos(productos) {
      const contenedor = document.getElementById('productos-api');
      contenedor.innerHTML = '';
      productos.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <img src="${p.imagen}" alt="${p.nombre}">
          <div class="product-info">
            <span class="product-status">${p.estado}</span>
            <h3>${p.nombre}</h3>
            <div class="product-price">${p.precio}</div>
            <p>${p.categoria}</p>
            <a class="btn" href="https://wa.me/50488238432?text=Hola,%20quiero%20información%20sobre%20${encodeURIComponent(p.nombre)}" target="_blank">Comprar por WhatsApp</a>
          </div>
        `;
        contenedor.appendChild(card);
      });
    }

    async function cargarProductos() {
      try {
        const res = await fetch(API_PRODUCTOS);
        if (!res.ok) throw new Error('Error API');
        const data = await res.json();
        mostrarProductos(data);
      } catch(e) {
        console.warn('Usando productos de ejemplo', e);
        mostrarProductos(productosDemo);
      }
    }

    cargarProductos();
  </script>
</body>
</html>
