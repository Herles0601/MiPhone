<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyFon | Celulares en Choluteca</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>MyFon</h1>
    <p>Celulares nuevos, usados y exportados en Choluteca, Honduras</p>
  </header>

  <main>
    <section class="filtros">
      <input type="text" id="buscador" placeholder="Buscar producto..." />
      <select id="filtroMarca">
        <option value="todos">Todas las marcas</option>
      </select>
    </section>

    <section id="productos" class="productos"></section>

    <aside class="carrito">
      <h2>Carrito</h2>
      <div id="listaCarrito"></div>
      <h3>Total: L. <span id="total">0</span></h3>

      <h2>Datos del cliente</h2>

      <input type="text" id="nombre" placeholder="Nombre del cliente" />
      <input type="tel" id="telefono" placeholder="Teléfono" />
      <input type="text" id="ciudad" placeholder="Ciudad o departamento" />

      <select id="metodoPago">
        <option value="">Método de pago</option>
        <option value="Efectivo">Efectivo</option>
        <option value="Transferencia BAC">Transferencia BAC</option>
        <option value="Transferencia Atlántida">Transferencia Atlántida</option>
        <option value="Transferencia Occidente">Transferencia Occidente</option>
        <option value="Transferencia Banpaís">Transferencia Banpaís</option>
        <option value="Transferencia Davivienda">Transferencia Davivienda</option>
      </select>

      <select id="envio">
        <option value="">Tipo de entrega</option>
        <option value="Retiro en Choluteca">Retiro en Choluteca</option>
        <option value="Envío por Rápido Cargo">Envío por Rápido Cargo</option>
      </select>

      <textarea id="observaciones" placeholder="Observaciones"></textarea>

      <button id="finalizarCompra">Enviar pedido por WhatsApp</button>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
